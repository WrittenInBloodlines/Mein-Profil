<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S.S. Archive</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cinzel:wght@600;700;900&family=Outfit:wght@300;400;500&display=swap');

    * { box-sizing: border-box; }

    body {
      background-color: #0a0707;
      background-image: 
        radial-gradient(circle at 50% 20%, rgba(139, 0, 0, 0.15), transparent 70%),
        radial-gradient(circle at 50% 80%, rgba(212, 175, 55, 0.08), transparent 70%);
      color: #e3d5ca;
      font-family: 'Outfit', sans-serif;
      line-height: 1.6;
      margin: 0;
      padding: 15px;
      overflow-x: hidden;
    }

    .container { max-width: 800px; margin: 0 auto; }

    h1 {
      font-family: 'Cinzel', serif;
      font-size: 36px;
      font-weight: 700;
      text-align: center;
      color: #d4af37;
      letter-spacing: 4px;
      margin-top: 15px;
      text-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
    }

    h2 {
      font-family: 'Playfair Display', serif;
      font-size: 16px;
      font-style: italic;
      color: #8b0000;
      text-align: center;
      margin-bottom: 25px;
      letter-spacing: 2px;
    }

    hr { border: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.5), transparent); margin: 25px 0; }

    /* REGAL CONTAINER */
    .shelf-wrapper {
      position: relative;
      background-color: #5c3519;
      background-image: repeating-linear-gradient(90deg, #825028 0px, #5c3519 20px, #945d31 40px, #4f2c13 65px, #7d4b24 85px, #5c3519 100px);
      padding: 30px 40px 0px 10px;
      border-top: 8px solid #4a2913;
      border-left: 5px solid #331a0a;
      border-right: 5px solid #331a0a;
      border-bottom: 20px solid #42230e;
      border-radius: 6px;
      box-shadow: inset 0 25px 35px rgba(0, 0, 0, 0.8), 0 20px 35px rgba(0, 0, 0, 0.95);
      margin-top: 20px;
      overflow: hidden;
    }

    .books-slider {
      display: flex;
      width: 200%;
      transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
    }

    .shelf-page {
      display: flex;
      width: 50%;
      justify-content: space-evenly;
      align-items: flex-end;
      padding: 0 5px;
    }

    /* BÜCHER - EXAKT GLEICH GROSS & SYMMETRISCH */
    .book-spine {
      flex: 0 0 22%;
      height: 320px;
      border-radius: 6px 10px 10px 6px;
      position: relative;
      cursor: pointer;
      box-shadow: -8px 6px 14px rgba(0, 0, 0, 0.85), inset 6px 0 10px rgba(255, 255, 255, 0.2);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .book-spine:hover {
      transform: translateY(-10px) scale(1.02);
      box-shadow: -10px 12px 20px rgba(212, 175, 55, 0.35);
    }

    /* FARB VARIANTEN */
    .alex { background: linear-gradient(90deg, #180303 0%, #5d1212 50%, #1c0404 100%); border: 1px solid #942424; }
    .ciro { background: linear-gradient(90deg, #030f0a 0%, #124733 50%, #04120c 100%); border: 1px solid #207354; }
    .blue { background: linear-gradient(90deg, #020a1a 0%, #122c5d 50%, #040c1c 100%); border: 1px solid #244694; }
    .purple { background: linear-gradient(90deg, #12021a 0%, #3f125d 50%, #0e041c 100%); border: 1px solid #652494; }
    .pink { background: linear-gradient(90deg, #1a020f 0%, #5d123b 50%, #1c0412 100%); border: 1px solid #94245d; }
    .orange { background: linear-gradient(90deg, #1a0b02 0%, #5d3412 50%, #1c0f04 100%); border: 1px solid #945324; }
    .brown { background: linear-gradient(90deg, #150d0a 0%, #3b2519 50%, #150d0a 100%); border: 1px solid #5a3723; }
    .white { background: linear-gradient(90deg, #222222 0%, #666666 50%, #222222 100%); border: 1px solid #aaaaaa; }

    /* ORNAMENTE */
    .book-spine::before {
      content: "✦ ⚜ ✦";
      position: absolute;
      top: 12px;
      color: #d4af37;
      font-size: 9px;
      letter-spacing: 2px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.9);
      z-index: 2;
    }

    .book-spine::after {
      content: "";
      position: absolute;
      top: 6px; left: 5px; right: 5px; bottom: 6px;
      border: 1px double rgba(212, 175, 55, 0.7);
      pointer-events: none;
    }

    .spine-title {
      transform: rotate(90deg);
      color: #fce7a2;
      font-family: 'Cinzel', serif;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
      text-shadow: 0 2px 4px rgba(0,0,0,0.9);
      z-index: 3;
    }

    .spine-ss {
      position: absolute;
      bottom: 12px;
      color: #d4af37;
      font-family: 'Cinzel', serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      z-index: 4;
    }

    /* PFEIL BUTTON */
    .nav-arrow {
      position: absolute;
      right: 6px;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(10, 7, 7, 0.75);
      border: 1px solid #d4af37;
      color: #d4af37;
      width: 28px;
      height: 48px;
      border-radius: 4px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      font-size: 18px;
      z-index: 20;
      transition: all 0.2s;
    }

    .nav-arrow:hover { background: #d4af37; color: #0a0707; }

    /* POPUP & BUCH ÖFFNEN */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(0,0,0,0.88); backdrop-filter: blur(6px);
      z-index: 9999; display: none; justify-content: center; align-items: center;
      opacity: 0; transition: opacity 0.3s ease;
    }

    .modal-overlay.active { display: flex; opacity: 1; }

    .interactive-book {
      width: 92%; max-width: 520px; height: 82vh;
      background: #bd9b70;
      background-image: radial-gradient(ellipse at center, rgba(240, 220, 185, 0.35) 0%, rgba(135, 95, 55, 0.5) 75%);
      border: 3px solid #420808; border-radius: 8px 14px 14px 8px;
      padding: 25px 20px 50px 20px; box-sizing: border-box;
      position: relative; display: flex; flex-direction: column;
    }

    .book-header {
      font-family: 'Cinzel', serif; font-size: 22px; color: #3b0505;
      text-align: center; border-bottom: 2px dashed #570b0b;
      padding-bottom: 10px; margin-bottom: 15px; font-weight: 900;
    }

    .book-body { flex: 1; overflow-y: auto; color: #1a0a03; font-family: 'Playfair Display', serif; font-size: 15px; }

    .book-controls {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 15px; border-top: 1px dashed rgba(87, 11, 11, 0.4); padding-top: 10px;
    }

    .nav-btn {
      background: #420808; color: #fce7a2; border: 1px solid #570b0b;
      padding: 6px 14px; font-family: 'Cinzel', serif; font-size: 12px;
      font-weight: 700; border-radius: 4px; cursor: pointer;
    }

    .page-indicator { font-family: 'Cinzel', serif; font-weight: 700; color: #420808; font-size: 13px; }

    .close-modal-btn {
      position: absolute; bottom: 12px; right: 18px;
      font-size: 12px; font-weight: bold; color: #8b0000;
      background: rgba(60, 10, 10, 0.15); border: 1px solid #8b0000;
      border-radius: 4px; padding: 3px 10px; cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>S.S.</h1>
    <h2>✦ Archive of the Eternal ✦</h2>

    <hr>

    <div class="shelf-wrapper">
      <div class="nav-arrow" id="arrowBtn" onclick="slideShelf()">❯</div>

      <div class="books-slider" id="slider">
        <div class="shelf-page">
          <div class="book-spine alex" onclick="openBook('alex')">
            <div class="spine-title">Alex (Ethyalexia)</div>
            <div class="spine-ss">S.S.</div>
          </div>
          <div class="book-spine ciro" onclick="openBook('ciro')">
            <div class="spine-title">Ciro (Cyrus)</div>
            <div class="spine-ss">S.S.</div>
          </div>
          <div class="book-spine blue" onclick="openBook('blue')">
            <div class="spine-title">Blue Archive</div>
            <div class="spine-ss">S.S.</div>
          </div>
          <div class="book-spine purple" onclick="openBook('purple')">
            <div class="spine-title">Purple Archive</div>
            <div class="spine-ss">S.S.</div>
          </div>
        </div>

        <div class="shelf-page">
          <div class="book-spine pink" onclick="openBook('pink')">
            <div class="spine-title">Pink Archive</div>
            <div class="spine-ss">S.S.</div>
          </div>
          <div class="book-spine orange" onclick="openBook('orange')">
            <div class="spine-title">Orange Archive</div>
            <div class="spine-ss">S.S.</div>
          </div>
          <div class="book-spine brown" onclick="openBook('brown')">
            <div class="spine-title">Brown Archive</div>
            <div class="spine-ss">S.S.</div>
          </div>
          <div class="book-spine white" onclick="openBook('white')">
            <div class="spine-title" style="color: #ffffff;">White Archive</div>
            <div class="spine-ss" style="color: #ffffff;">S.S.</div>
          </div>
        </div>
      </div>
    </div>

    <hr>
  </div>

  <div class="modal-overlay" id="modal">
    <div class="interactive-book">
      <div class="book-header" id="bookTitle">Buch Titel</div>
      <div class="book-body" id="bookContent">Inhalt</div>
      <div class="book-controls">
        <button class="nav-btn" onclick="changePage(-1)">&lt; Zurück</button>
        <span class="page-indicator" id="pageIndicator">Seite 1 / 12</span>
        <button class="nav-btn" onclick="changePage(1)">Weiter &gt;</button>
      </div>
      <button class="close-modal-btn" onclick="closeBook()">✕ Schließen</button>
    </div>
  </div>

  <script>
    const alexPages = [
      "<b>1. Profil & Erscheinung:</b><br>✦ Alter: 44 Jahre • 21. Dezember<br>✦ Größe: 1.90 m<br>✦ Merkmale: Blasse Haut, rote Augen, langes weißes Haar.",
      "<b>2. Psychologie & Trauma:</b><br>Aufgewachsen in kühler Familie. Mit 21 Jahren von einem Vampir verwandelt.",
      "<b>3. Fähigkeiten:</b><br>Übernatürliche Geschwindigkeit, lautloses Bewegen.",
      "<b>4. Alltag:</b><br>Nachtaktiv. Zeichnet, liest und spielt Klavier.",
      "<b>5. Geheimnisse:</b><br>Leere Seite...", "<b>6. Zeitleiste:</b><br>Leere Seite...",
      "<b>7. Beziehungen:</b><br>Leere Seite...", "<b>8. Erschaffer:</b><br>Leere Seite...",
      "<b>9. Besitztümer:</b><br>Leere Seite...", "<b>10. Kunst:</b><br>Leere Seite...",
      "<b>11. Chroniken:</b><br>Leere Seite...", "<b>12. Ende:</b><br>Leere Seite..."
    ];

    const ciroPages = [
      "<b>1. Profil & Erscheinung:</b><br>✦ Alter: 47 Jahre • 12. Juli<br>✦ Größe: 1.82 m<br>✦ Merkmale: Schwarze Locken, braune Augen, Schnurrbart.",
      "<b>2. Trauma:</b><br>Verlor mit 15 seinen Bruder Xavier an die Mafia.",
      "<b>3. Fähigkeiten:</b><br>Nahkampf-Experte, taktischer Verstand.",
      "<b>4. Alltag:</b><br>Erfolgreicher Geschäftsmann, kocht gerne.",
      "<b>5. Geheimnisse:</b><br>Leere Seite...", "<b>6. Zeitleiste:</b><br>Leere Seite...",
      "<b>7. Beziehungen:</b><br>Leere Seite...", "<b>8. Erschaffer:</b><br>Leere Seite...",
      "<b>9. Besitztümer:</b><br>Leere Seite...", "<b>10. Kunst:</b><br>Leere Seite...",
      "<b>11. Chroniken:</b><br>Leere Seite...", "<b>12. Ende:</b><br>Leere Seite..."
    ];

    const emptyPages = Array(12).fill("Diese Seite ist noch leer.");

    const bookData = {
      alex: { title: "Alex (Ethyalexia)", pages: alexPages },
      ciro: { title: "Ciro (Cyrus)", pages: ciroPages },
      blue: { title: "Blue Archive", pages: emptyPages },
      purple: { title: "Purple Archive", pages: emptyPages },
      pink: { title: "Pink Archive", pages: emptyPages },
      orange: { title: "Orange Archive", pages: emptyPages },
      brown: { title: "Brown Archive", pages: emptyPages },
      white: { title: "White Archive", pages: emptyPages }
    };

    let activePages = [];
    let currentPageIndex = 0;
    let currentShelfPage = 1;

    function slideShelf() {
      const slider = document.getElementById('slider');
      const arrow = document.getElementById('arrowBtn');
      if (currentShelfPage === 1) {
        slider.style.transform = 'translateX(-50%)';
        arrow.innerText = '❮';
        currentShelfPage = 2;
      } else {
        slider.style.transform = 'translateX(0)';
        arrow.innerText = '❯';
        currentShelfPage = 1;
      }
    }

    function openBook(key) {
      const book = bookData[key];
      document.getElementById('bookTitle').innerText = book.title;
      activePages = book.pages;
      currentPageIndex = 0;
      renderPage();
      document.getElementById('modal').classList.add('active');
    }

    function renderPage() {
      document.getElementById('bookContent').innerHTML = activePages[currentPageIndex];
      document.getElementById('pageIndicator').innerText = `Seite ${currentPageIndex + 1} / 12`;
    }

    function changePage(dir) {
      const next = currentPageIndex + dir;
      if (next >= 0 && next < activePages.length) {
        currentPageIndex = next;
        renderPage();
      }
    }

    function closeBook() {
      document.getElementById('modal').classList.remove('active');
    }
  </script>

</body>
</html>
