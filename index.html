<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S.S. Archive</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cinzel:wght@600;700;900&family=Outfit:wght@300;400;500&family=Caveat:wght@600&family=Patrick+Hand&display=swap');

    * { box-sizing: border-box; }

    body {
      background-color: #060404;
      background-image: 
        radial-gradient(circle at 50% 30%, rgba(180, 20, 20, 0.2), transparent 60%),
        radial-gradient(circle at 50% 85%, rgba(212, 175, 55, 0.12), transparent 65%);
      color: #e3d5ca;
      font-family: 'Outfit', sans-serif;
      line-height: 1.6;
      margin: 0;
      padding: 15px;
      overflow-x: hidden;
    }

    .container { max-width: 820px; margin: 0 auto; }

    h1 {
      font-family: 'Cinzel', serif;
      font-size: 40px;
      font-weight: 900;
      text-align: center;
      color: #d4af37;
      letter-spacing: 6px;
      margin-top: 15px;
      text-shadow: 0 0 20px rgba(212, 175, 55, 0.5), 0 0 35px rgba(139, 0, 0, 0.6);
    }

    h2 {
      font-family: 'Playfair Display', serif;
      font-size: 16px;
      font-style: italic;
      color: #b32d2d;
      text-align: center;
      margin-bottom: 25px;
      letter-spacing: 3px;
      text-shadow: 0 0 8px rgba(179, 45, 45, 0.4);
    }

    hr { 
      border: 0; 
      height: 2px; 
      background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.8), transparent); 
      margin: 25px 0; 
    }

    /* EDLES HOLZREGAL CONTAINER */
    .shelf-wrapper {
      position: relative;
      background-color: #3d210f;
      background-image: 
        linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
        repeating-linear-gradient(90deg, #5c3218 0px, #3d210f 25px, #6e3d1e 50px, #2e180a 75px, #4d2812 100px);
      padding: 35px 45px 0px 10px;
      border-top: 10px solid #2b160a;
      border-left: 6px solid #1f0f07;
      border-right: 6px solid #1f0f07;
      border-bottom: 22px solid #241107;
      border-radius: 8px;
      box-shadow: 
        inset 0 30px 40px rgba(0, 0, 0, 0.95),
        inset 0 -10px 15px rgba(0, 0, 0, 0.8),
        0 25px 40px rgba(0, 0, 0, 0.9);
      margin-top: 20px;
      overflow: hidden;
    }

    /* GOLDENE REGAL-LEISTE OBEN */
    .shelf-wrapper::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, #5c4314, #d4af37, #5c4314);
      opacity: 0.7;
    }

    .books-slider {
      display: flex;
      width: 200%;
      transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
    }

    .shelf-page {
      display: flex;
      width: 50%;
      justify-content: space-evenly;
      align-items: flex-end;
      padding: 0 5px;
    }

    /* BÜCHER - DESIGN OHNE DIE STREIFEN OBEN/UNTEN */
    .book-spine {
      flex: 0 0 22%;
      height: 325px;
      border-radius: 5px 10px 10px 5px;
      position: relative;
      cursor: pointer;
      box-shadow: 
        -10px 8px 18px rgba(0, 0, 0, 0.9), 
        inset 7px 0 12px rgba(255, 255, 255, 0.18),
        inset -3px 0 8px rgba(0, 0, 0, 0.7);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .book-spine:hover {
      transform: translateY(-12px) scale(1.03);
      box-shadow: -12px 15px 25px rgba(212, 175, 55, 0.45);
    }

    /* OBERES ORNAMENT SANFT PLATZIERT */
    .book-spine::before {
      content: "✦ ⚜ ✦";
      position: absolute;
      top: 15px;
      color: #d4af37;
      font-size: 9px;
      letter-spacing: 2px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.9);
      z-index: 2;
    }

    /* ORNAMENTE & RAHMEN */
    .book-spine::after {
      content: "";
      position: absolute;
      top: 8px; left: 6px; right: 6px; bottom: 8px;
      border: 1px double rgba(212, 175, 55, 0.75);
      border-radius: 3px;
      pointer-events: none;
      box-shadow: inset 0 0 5px rgba(0,0,0,0.5);
    }

    /* FARB VARIANTEN */
    .alex { background: linear-gradient(90deg, #0d0101 0%, #691111 50%, #170202 100%); border: 1px solid #a82828; }
    .ciro { background: linear-gradient(90deg, #010a06 0%, #114e37 50%, #02170f 100%); border: 1px solid #238560; }
    .blue { background: linear-gradient(90deg, #010712 0%, #11306b 50%, #020e24 100%); border: 1px solid #2852a8; }
    .purple { background: linear-gradient(90deg, #0a0112 0%, #46116b 50%, #150224 100%); border: 1px solid #7328a8; }
    .pink { background: linear-gradient(90deg, #12010b 0%, #6b1143 50%, #240217 100%); border: 1px solid #a8286a; }
    .orange { background: linear-gradient(90deg, #120701 0%, #6b3b11 50%, #241102 100%); border: 1px solid #a85e28; }
    .brown { background: linear-gradient(90deg, #0f0805 0%, #42281b 50%, #170c07 100%); border: 1px solid #633c27; }
    .white { background: linear-gradient(90deg, #141414 0%, #525252 50%, #1c1c1c 100%); border: 1px solid #999999; }

    .spine-title {
      transform: rotate(90deg);
      color: #fce7a2;
      font-family: 'Cinzel', serif;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
      text-shadow: 0 2px 5px rgba(0,0,0,0.95);
      letter-spacing: 1px;
      z-index: 3;
    }

    .spine-ss {
      position: absolute;
      bottom: 12px;
      color: #d4af37;
      font-family: 'Cinzel', serif;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 2px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.9);
      z-index: 4;
    }

    /* PFEIL BUTTON ALS GOLDENES SIEGEL */
    .nav-arrow {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      background: linear-gradient(135deg, #2b170c, #0a0707);
      border: 1px solid #d4af37;
      color: #d4af37;
      width: 32px;
      height: 52px;
      border-radius: 6px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      font-size: 18px;
      z-index: 20;
      box-shadow: 0 4px 10px rgba(0,0,0,0.8);
      transition: all 0.3s ease;
    }

    .nav-arrow:hover { 
      background: #d4af37; 
      color: #0a0707; 
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.8);
    }

    /* POPUP & BUCH ÖFFNEN */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(0,0,0,0.9); backdrop-filter: blur(8px);
      z-index: 9999; display: none; justify-content: center; align-items: center;
      opacity: 0; transition: opacity 0.3s ease;
    }

    .modal-overlay.active { display: flex; opacity: 1; }

    .interactive-book {
      width: 92%; max-width: 540px; height: 84vh;
      background: #bd9b70;
      background-image: radial-gradient(ellipse at center, rgba(240, 220, 185, 0.4) 0%, rgba(135, 95, 55, 0.6) 75%);
      border: 3px solid #420808; border-radius: 8px 14px 14px 8px;
      padding: 25px 20px 50px 20px; box-sizing: border-box;
      position: relative; display: flex; flex-direction: column;
      box-shadow: 0 0 40px rgba(0,0,0,0.9);
    }

    .book-header {
      font-family: 'Cinzel', serif; font-size: 22px; color: #3b0505;
      text-align: center; border-bottom: 2px dashed #570b0b;
      padding-bottom: 10px; margin-bottom: 15px; font-weight: 900;
    }

    /* TAGEBUCH-SCHRIFT FÜR DEN INHALT */
    .book-body { 
      flex: 1; 
      overflow-y: auto; 
      color: #1a0a03; 
      font-family: 'Patrick Hand', 'Caveat', cursive; 
      font-size: 20px; 
      line-height: 1.5; 
      letter-spacing: 0.5px;
    }

    .book-controls {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 15px; border-top: 1px dashed rgba(87, 11, 11, 0.4); padding-top: 10px;
    }

    .nav-btn {
      background: #420808; color: #fce7a2; border: 1px solid #570b0b;
      padding: 6px 14px; font-family: 'Cinzel', serif; font-size: 12px;
      font-weight: 700; border-radius: 4px; cursor: pointer;
    }

    .page-indicator { font-family: 'Cinzel', serif; font-weight: 700; color: #420808; font-size: 13px; }

    .close-modal-btn {
      position: absolute; bottom: 12px; right: 18px;
      font-size: 12px; font-weight: bold; color: #8b0000;
      background: rgba(60, 10, 10, 0.15); border: 1px solid #8b0000;
      border-radius: 4px; padding: 3px 10px; cursor: pointer;
    }

    /* DUNKLES ZITAT */
    .quote-box {
      font-family: 'Caveat', cursive;
      font-size: 24px;
      font-weight: 600;
      color: #0d0d0d;
      border-left: 3px solid #420808;
      padding-left: 12px;
      margin-top: 20px;
      line-height: 1.4;
    }

    .quote-author {
      text-align: right;
      color: #3b0505;
      font-family: 'Cinzel', serif;
      font-size: 14px;
      font-weight: 700;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>S.S.</h1>
    <h2>✦ Archive of the Eternal ✦</h2>

    <hr>

    <div class="shelf-wrapper">
      <div class="nav-arrow" id="arrowBtn" onclick="slideShelf()">❯</div>

      <div class="books-slider" id="slider">
        <div class="shelf-page">
          <div class="book-spine alex" onclick="openBook('alex')">
            <div class="spine-title">Alex (Ethyalexia)</div>
            <div class="spine-ss">S.S.</div>
          </div>
          <div class="book-spine ciro" onclick="openBook('ciro')">
            <div class="spine-title">Ciro (Cyrus)</div>
            <div class="spine-ss">S.S.</div>
          </div>
          <div class="book-spine blue" onclick="openBook('blue')">
            <div class="spine-title">Blue Archive</div>
            <div class="spine-ss">S.S.</div>
          </div>
          <div class="book-spine purple" onclick="openBook('purple')">
            <div class="spine-title">Purple Archive</div>
            <div class="spine-ss">S.S.</div>
          </div>
        </div>

        <div class="shelf-page">
          <div class="book-spine pink" onclick="openBook('pink')">
            <div class="spine-title">Pink Archive</div>
            <div class="spine-ss">S.S.</div>
          </div>
          <div class="book-spine orange" onclick="openBook('orange')">
            <div class="spine-title">Orange Archive</div>
            <div class="spine-ss">S.S.</div>
          </div>
          <div class="book-spine brown" onclick="openBook('brown')">
            <div class="spine-title">Brown Archive</div>
            <div class="spine-ss">S.S.</div>
          </div>
          <div class="book-spine white" onclick="openBook('white')">
            <div class="spine-title" style="color: #ffffff;">White Archive</div>
            <div class="spine-ss" style="color: #ffffff;">S.S.</div>
          </div>
        </div>
      </div>
    </div>

    <hr>
  </div>

  <div class="modal-overlay" id="modal">
    <div class="interactive-book">
      <div class="book-header" id="bookTitle">Buch Titel</div>
      <div class="book-body" id="bookContent">Inhalt</div>
      <div class="book-controls">
        <button class="nav-btn" onclick="changePage(-1)">&lt; Zurück</button>
        <span class="page-indicator" id="pageIndicator">Seite 1 / 12</span>
        <button class="nav-btn" onclick="changePage(1)">Weiter &gt;</button>
      </div>
      <button class="close-modal-btn" onclick="closeBook()">✕ Schließen</button>
    </div>
  </div>

  <script>
    const alexPages = [
      "<b>1. Daten & Aussehen:</b><br>✦ <b>Name:</b> Ethyalexia Eztliquies (Alex)<br>✦ <b>Alter:</b> 44 Jahre • 21. Dezember<br>✦ <b>Größe:</b> 1,90 m<br><br><b>Erscheinung:</b> Extrem helle Haut, markante rote Augen und langes weißes Haar. Seine stattliche Größe verleiht ihm eine imposante, unnahbare Ausstrahlung.<br><br><b>Kleidung & Merkmale:</b> Elegante, tiefschwarze Garderobe mit langem Mantel und Handschuhen. Bekannt als 'der langhaarige weiße Vampir'. Trägt Ciros Ehering von unschätzbarem Wert.",

      "<b>2. Kindheitstrauma:</b><br>Alex wuchs in einer wohlhabenden, aber emotional völlig unterkühlten Familie auf. Seine Eltern ließen ihn von Geburt an spüren, dass er eine Enttäuschung war – ihr Wunsch war eine Tochter gewesen.<br><br>Diese lieblose Erziehung zwang ihn früh zur emotionalen Unabhängigkeit. Die Konsequenz war radikal: Alex brach den Kontakt zu seinen Eltern komplett ab.",

      "<b>3. Die Verwandlung:</b><br>Mit 21 Jahren erreichte die Einsamkeit ihren Höhepunkt. Doch bevor er aufgeben konnte, begegnete er einem Vampir, der ihn fasziniert beobachtet hatte.<br><br>Der Vampir sah in Alex ungewöhnliche innere Stärke und verwandelte ihn als eine Art Experiment. Unbewusst rettete er Alex dadurch das Leben, stellte ihn aber vor eine völlig neue, düstere Natur.",

      "<b>4. Schutzhaltung & Isolierung:</b><br>Die Transformation brachte die Bürde der Unsterblichkeit und des ständigen Hungers mit sich. Aus seinem Trauma resultiert eine extreme Distanz gegenüber Fremden.<br><br>Er instrumentalisiert seinen bedrohlichen Ruf gezielt, um Menschen auf Abstand zu halten. Seine Loyalität verschenkt er nur an jene, die ihn bedingungslos akzeptieren.",

      "<b>5. Der Beobachter:</b><br>Der Vampir, der Alex erschuf, beobachtet ihn bis heute aus der Distanz.<br><br>Besonders seit Alex Ciro kennengelernt hat, zeigt sein Erschaffer erneut Interesse, da Ciro eine unerwartete Veränderung in Alex bewirkt. Dadurch fühlt sich Ciro in Alex' Nähe manchmal beobachtet – ohne zu ahnen, wie wahr dieser Verdacht ist.",

      "<b>6. Übernatürliche Fähigkeiten:</b><br>✦ <b>Physische Perfektion:</b> Übermenschliche Geschwindigkeit und absolut lautlose Bewegungen.<br><br>✦ <b>Hyper-Sensorik:</b> Hört den Herzschlag anderer und nimmt kleinste Nuancen der Umgebung wahr.<br><br>✦ <b>Präsenzkontrolle:</b> Kann seine Aura dämpfen, um wie ein gewöhnlicher Mensch zu wirken.",

      "<b>7. Die biologische Kehrseite:</b><br>Sein Überleben und seine Regeneration sind an den Konsum von Blut oder Fleisch gebunden. Dieser Zwang zerreißt ihn innerlich und widerspricht seiner Moral.<br><br>Da ein Verzicht seinen Tod bedeuten würde, führt er täglich einen disziplinierten Kampf um den Erhalt seiner verbliebenen Menschlichkeit.",

      "<b>8. Alltag & Leidenschaften:</b><br>Da er das Tageslicht meidet, erwacht Alex' Welt in der Dunkelheit. In der Stille der Nacht zeichnet, liest und reflektiert er.<br><br>Seine große Leidenschaft ist die Kunst und die klassische Musik (Klavier und Violine). Er spielt selbst meisterhaft Violine, verbirgt dieses Talent jedoch vor der Welt.",

      "<b>9. Das verbindende Ritual:</b><br>Obwohl Alex menschliche Nahrung biologisch nicht verwerten kann, kocht Ciro regelmäßig für ihn.<br><br>Alex schätzt dieses symbolische Ritual zutiefst: Es spendet beiden ein Gefühl von Normalität, Geborgenheit und einem echten Zuhause.",

      "<b>10. Beziehungsdynamik:</b><br>Ciro verliebte sich zuerst – fasziniert vom Kontrast aus Alex' Gefahr und seiner inneren Ruhe. Alex brauchte lange, um seine Verteidigungsmauern abzubauen.<br><br>Der Wendepunkt geschah auf einer einfachen Bank, als Alex Ciro vorsichtig küsste und Ciro entschlossen erwiderte. Es besiegelte ihr gemeinsames Schicksal.",

      "<b>11. Das Band der Ehe:</b><br>Heute führen sie eine Ehe voller Vertrauen. Ciro ist Alex' exklusiver Anker, bei dem er seine Maske fallen lassen kann.<br><br>Ciros Wärme gibt Alex die bedingungslose Akzeptanz, die seine Eltern ihm verwehrten, während Alex' Unsterblichkeit Ciro die Furcht vor dem Verlassenwerden nimmt.",

      "<b>12. Zitat von Alex:</b><br><div class='quote-box'>»Die Dunkelheit war mein einziger Zufluchtsort, bis deine Stimme das Schweigen brach. Ich habe gelernt zu überleben, aber erst an deiner Seite habe ich gelernt, was es bedeutet, zu leben.«</div><div class='quote-author'>— Ethyalexia</div>"
    ];

    const ciroPages = [
      "<b>1. Daten & Aussehen:</b><br>✦ <b>Name:</b> Cyrus D’Amantino (Ciro)<br>✦ <b>Alter:</b> 47 Jahre • 12. Juli<br>✦ <b>Größe:</b> 1,82 m<br><br><b>Erscheinung:</b> Schulterlanges, schwarzes Lockenhaar, warme braune Augen, gemischte Hautfarbe und ein gepflegter schwarzer Schnurrbart.<br><br><b>Kleidung & Merkmale:</b> Elegante Kleidung in Schwarz-Weiß (Licht & Schatten). Trägt den weißen Ohrstecker seines verstorbenen Bruders Xavier und Alex' Ehering.",

      "<b>2. Das Kindheitstrauma:</b><br>Mit 15 Jahren wurde Ciros älterer Bruder Xavier von der Mafia entführt. Trotz harten Trainings und eines verzweifelten Rettungsversuchs kam Ciro zu spät – Xavier war bereits hingerichtet worden.<br><br>Dieses Scheitern verankerte in Ciro eine tiefe Verlustangst und ein extremes Verantwortungsgefühl.",

      "<b>3. Die Erinnerung an Xavier:</b><br>Vor dem Unglück waren die Brüder unzertrennlich. Xavier war der ruhige Gegenpol zum lebhaften, verspielten Ciro.<br><br>Ciro gab sich jahrelang selbst die Schuld. In ihm blieb die ständige Angst zurück, erneut jemanden zu verlieren, weil er nicht stark oder schnell genug war.",

      "<b>4. Der Weg zur Macht:</b><br>Um nie wieder machtlos zu sein, baute Ciro seine Fähigkeiten aus, lernte Strategie und behauptete sich in gefährlichen Strukturen.<br><br>Sein späterer Erfolg als Geschäftsmann entsprang dem tiefen Bedürfnis, die Menschen zu beschützen, die ihm wichtig sind.",

      "<b>5. Die Maske des Charmes:</b><br>Um seine Wunden zu verbergen, zeigt er nach außen eine charmante, verspielte und manchmal naive Fassade. Dieser Humor ist sein Schutzschild.<br><br>In Wahrheit liest er Menschen sekundenschnell und schaltet bei Gefahr sofort in einen hochfokussierten, todernsten Modus.",

      "<b>6. Fähigkeiten & Verstand:</b><br>✦ <b>Nahkampf-Meister:</b> Durch jahrelanges Training im Untergrund ist er ein hocheffizienter Kämpfer.<br><br>✦ <b>Analytisches Genie:</b> Seine größte Waffe ist sein Verstand. Er denkt mehrere Schritte voraus und besitzt ein brillantes psychologisches Gespür.",

      "<b>7. Alltag & Vorlieben:</b><br>Ciro führt als Geschäftsmann ein strukturiertes Tagleben. Als Ausgleich liebt er Tiere, zeigt große Affinität zu Kindern und findet Entspannung in Musik.<br><br>Er gleicht Alex' nachtaktiven Rhythmus perfekt aus und bringt Wärme in ihren gemeinsamen Alltag.",

      "<b>8. Die Leidenschaft fürs Kochen:</b><br>Ciro kocht leidenschaftlich gerne. Für ihn ist das Zubereiten von Mahlzeiten der ultimative Liebesbeweis.<br><br>Auch wenn Alex die Nahrung biologisch nicht braucht, kocht Ciro regelmäßig für ihn, um ihnen ein Gefühl von Geborgenheit zu schenken.",

      "<b>9. Die Anziehung zu Alex:</b><br>Ciro verliebte sich zuerst – fasziniert von der gefährlichen Aura des Vampirs und der tiefen Stille in seinem Inneren.<br><br>Er spürte Alex' Schmerz und beschloss geduldig, die dicken Mauern um Alex' Herz Stein für Stein abzutragen.",

      "<b>10. Der Wendepunkt:</b><br>Auf einer Bank gestand Alex ihm stumm seine Gefühle mit einem ersten, vorsichtigen Kuss.<br><br>Ciros anfänglicher Schock wandelte sich in einen tiefen, entschlossenen Gegenkuss, der ihre Seelen für immer miteinander verband.",

      "<b>11. Heilung durch die Ehe:</b><br>In ihrer Ehe heilen sie gegenseitig ihre Wunden. Ciro schenkt Alex Wärme und bedingungslose Akzeptanz.<br><br>Durch Alex' Stärke und Unsterblichkeit lernt Ciro wiederum, dass wahre Liebe nicht bedeutet, aus Angst zu klammern, sondern in Freiheit zu vertrauen.",

      "<b>12. Zitat von Ciro:</b><br><div class='quote-box'>»Ich habe mein ganzes Leben damit verbracht, stark genug zu werden, um niemanden mehr zu verlieren. Bei dir habe ich erkannt, dass Stärke nicht bedeutet, die Welt zu beherrschen – sondern demjenigen einen Zufluchtsort zu bieten, den man liebt.«</div><div class='quote-author'>— Cyrus</div>"
    ];

    const emptyPages = Array(12).fill("Diese Seite ist noch leer.");

    const bookData = {
      alex: { title: "Alex (Ethyalexia)", pages: alexPages },
      ciro: { title: "Ciro (Cyrus)", pages: ciroPages },
      blue: { title: "Blue Archive", pages: emptyPages },
      purple: { title: "Purple Archive", pages: emptyPages },
      pink: { title: "Pink Archive", pages: emptyPages },
      orange: { title: "Orange Archive", pages: emptyPages },
      brown: { title: "Brown Archive", pages: emptyPages },
      white: { title: "White Archive", pages: emptyPages }
    };

    let activePages = [];
    let currentPageIndex = 0;
    let currentShelfPage = 1;

    function slideShelf() {
      const slider = document.getElementById('slider');
      const arrow = document.getElementById('arrowBtn');
      if (currentShelfPage === 1) {
        slider.style.transform = 'translateX(-50%)';
        arrow.innerText = '❮';
        currentShelfPage = 2;
      } else {
        slider.style.transform = 'translateX(0)';
        arrow.innerText = '❯';
        currentShelfPage = 1;
      }
    }

    function openBook(key) {
      const book = bookData[key];
      document.getElementById('bookTitle').innerText = book.title;
      activePages = book.pages;
      currentPageIndex = 0;
      renderPage();
      document.getElementById('modal').classList.add('active');
    }

    function renderPage() {
      document.getElementById('bookContent').innerHTML = activePages[currentPageIndex];
      document.getElementById('pageIndicator').innerText = `Seite ${currentPageIndex + 1} / 12`;
    }

    function changePage(dir) {
      const next = currentPageIndex + dir;
      if (next >= 0 && next < activePages.length) {
        currentPageIndex = next;
        renderPage();
      }
    }

    function closeBook() {
      document.getElementById('modal').classList.remove('active');
