<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S.S. Archive</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cinzel:wght@600;700;900&family=Outfit:wght@300;400;500&display=swap');

    body {
      background-color: #0a0707;
      background-image: 
        radial-gradient(circle at 50% 20%, rgba(139, 0, 0, 0.15), transparent 70%),
        radial-gradient(circle at 50% 80%, rgba(212, 175, 55, 0.08), transparent 70%);
      color: #e3d5ca;
      font-family: 'Outfit', sans-serif;
      line-height: 1.6;
      margin: 0;
      padding: 20px;
      overflow-x: hidden;
    }

    .container { max-width: 900px; margin: 0 auto; }

    h1 {
      font-family: 'Cinzel', serif;
      font-size: 38px;
      font-weight: 700;
      text-align: center;
      color: #d4af37;
      letter-spacing: 5px;
      margin-top: 20px;
      text-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
    }

    h2 {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-style: italic;
      color: #8b0000;
      text-align: center;
      margin-bottom: 30px;
      letter-spacing: 2px;
    }

    hr { border: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.5), transparent); margin: 30px 0; }

    /* BÜCHERREGAL SYSTEM */
    .shelf-wrapper {
      position: relative;
      background-color: #5c3519;
      background-image: repeating-linear-gradient(90deg, #825028 0px, #5c3519 20px, #945d31 40px, #4f2c13 65px, #7d4b24 85px, #5c3519 100px);
      padding: 40px 10px 0px 10px;
      border-top: 8px solid #4a2913;
      border-bottom: 24px solid #42230e;
      border-radius: 6px;
      box-shadow: inset 0 25px 35px rgba(0, 0, 0, 0.8), 0 20px 35px rgba(0, 0, 0, 0.95);
      margin-top: 25px;
      overflow: hidden;
    }

    .books-container {
      display: flex;
      gap: 15px;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      width: 200%; /* Platz für zwei Sets */
    }

    .shelf-set {
      display: flex;
      justify-content: space-around;
      width: 50%;
      padding: 0 20px;
      box-sizing: border-box;
    }

    /* NAVIGATION PFEIL */
    .shelf-nav {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 40px;
      color: #d4af37;
      cursor: pointer;
      z-index: 10;
      text-shadow: 0 0 10px #000;
      transition: all 0.3s;
    }
    .shelf-nav:hover { scale: 1.2; color: #fff; }

    /* BUCHRÜCKEN STYLES */
    .book-spine {
      width: 100px;
      height: 320px;
      border-radius: 4px 10px 10px 4px;
      position: relative;
      cursor: pointer;
      box-shadow: -10px 5px 15px rgba(0, 0, 0, 0.8), inset 5px 0 10px rgba(255, 255, 255, 0.15);
      transition: all 0.3s ease;
      display: flex;
      justify-content: center;
      align-items: center;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .book-spine:hover { transform: translateY(-15px); box-shadow: 0 15px 25px rgba(212, 175, 55, 0.4); }

    /* FARBEN */
    .alex { background: linear-gradient(90deg, #180303, #5d1212, #1c0404); border-color: #942424; }
    .ciro { background: linear-gradient(90deg, #030f0a, #124733, #04120c); border-color: #207354; }
    .blue { background: linear-gradient(90deg, #020a1a, #122c5d, #040c1c); border-color: #244694; }
    .purple { background: linear-gradient(90deg, #12021a, #3f125d, #0e041c); border-color: #652494; }
    .pink { background: linear-gradient(90deg, #1a020f, #5d123b, #1c0412); border-color: #94245d; }
    .orange { background: linear-gradient(90deg, #1a0b02, #5d3412, #1c0f04); border-color: #945324; }
    .brown { background: linear-gradient(90deg, #150d0a, #3b2519, #150d0a); border-color: #4a2e1d; }
    .white { background: linear-gradient(90deg, #1a1a1a, #555, #1a1a1a); border-color: #888; }

    /* ORNAMENTE */
    .book-spine::before {
      content: "✦ ⚜ ✦"; position: absolute; top: 15px; color: #d4af37; font-size: 10px; letter-spacing: 2px;
    }
    .book-spine::after {
      content: ""; position: absolute; top: 8px; left: 6px; right: 6px; bottom: 8px; border: 1px double rgba(212, 175, 55, 0.6);
    }
    .spine-title {
      transform: rotate(90deg); color: #fce7a2; font-family: 'Cinzel', serif; font-size: 13px; font-weight: 700; white-space: nowrap; text-shadow: 0 1px 4px #000;
    }
    .spine-ss { position: absolute; bottom: 15px; color: #d4af37; font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 2px; }

    /* MODAL / BUCH ÖFFNEN */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9);
      backdrop-filter: blur(8px); z-index: 100; display: none; justify-content: center; align-items: center; opacity: 0; transition: 0.4s;
    }
    .modal-overlay.active { display: flex; opacity: 1; }
    
    .interactive-book {
      width: 90%; max-width: 500px; height: 80vh; background: #bd9b70;
      border: 3px solid #420808; border-radius: 8px 15px 15px 8px; padding: 30px;
      box-shadow: 0 0 50px #000; display: flex; flex-direction: column; position: relative;
    }

    .book-header { font-family: 'Cinzel', serif; font-size: 20px; color: #3b0505; text-align: center; border-bottom: 2px dashed #420808; padding-bottom: 10px; margin-bottom: 20px; font-weight: 900; }
    .book-body { flex: 1; overflow-y: auto; color: #1a0a03; font-family: 'Playfair Display', serif; font-size: 16px; line-height: 1.6; }
    .book-controls { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; border-top: 1px dashed #420808; padding-top: 10px; }
    
    .nav-btn { background: #420808; color: #fce7a2; border: none; padding: 8px 15px; font-family: 'Cinzel', serif; cursor: pointer; border-radius: 4px; }
    .page-indicator { color: #420808; font-weight: 700; font-family: 'Cinzel', serif; }
    .close-btn { position: absolute; bottom: 10px; right: 20px; color: #8b0000; cursor: pointer; font-weight: 700; background: none; border: none; }
  </style>
</head>
<body>

  <div class="container">
    <h1>S.S.</h1>
    <h2>✦ Archive of the Eternal ✦</h2>
    <hr>

    <div class="shelf-wrapper">
      <div class="shelf-nav" id="nextBtn" onclick="toggleShelf()">❯</div>
      
      <div class="books-container" id="bookshelf">
        <div class="shelf-set">
          <div class="book-spine alex" onclick="openBook('alex')">
            <div class="spine-title">Alex (Ethyalexia)</div>
            <div class="spine-ss">S.S.</div>
          </div>
          <div class="book-spine ciro" onclick="openBook('ciro')">
            <div class="spine-title">Ciro (Cyrus)</div>
            <div class="spine-ss">S.S.</div>
          </div>
          <div class="book-spine blue" onclick="openBook('blue')">
            <div class="spine-title">Blue Archive</div>
            <div class="spine-ss">S.S.</div>
          </div>
          <div class="book-spine purple" onclick="openBook('purple')">
            <div class="spine-title">Purple Archive</div>
            <div class="spine-ss">S.S.</div>
          </div>
        </div>

        <div class="shelf-set">
          <div class="book-spine pink" onclick="openBook('pink')">
            <div class="spine-title">Volume III</div>
            <div class="spine-ss">S.S.</div>
          </div>
          <div class="book-spine orange" onclick="openBook('orange')">
            <div class="spine-title">Volume IV</div>
            <div class="spine-ss">S.S.</div>
          </div>
          <div class="book-spine brown" onclick="openBook('brown')">
            <div class="spine-title">Volume V</div>
            <div class="spine-ss">S.S.</div>
          </div>
          <div class="book-spine white" onclick="openBook('white')">
            <div class="spine-title" style="color: #333; text-shadow: none;">Volume VI</div>
            <div class="spine-ss" style="color: #333;">S.S.</div>
          </div>
        </div>
      </div>
    </div>

    <hr>
    <blockquote style="text-align: center; border: none; background: rgba(18,10,10,0.8); padding: 20px; border-radius: 10px;">
      <i>"In every shadow, a story waits. In every book, a soul is kept."</i><br>
      <span style="color: #d4af37;">✦ S.S. ✦</span>
    </blockquote>
  </div>

  <div class="modal-overlay" id="modal">
    <div class="interactive-book">
      <div class="book-header" id="bookTitle">Titel</div>
      <div class="book-body" id="bookContent">Inhalt</div>
      <div class="book-controls">
        <button class="nav-btn" onclick="changePage(-1)">❮</button>
        <span class="page-indicator" id="pageIndicator">1 / 12</span>
        <button class="nav-btn" onclick="changePage(1)">❯</button>
      </div>
      <button class="close-btn" onclick="closeBook()">✕ Schließen</button>
    </div>
  </div>

  <script>
    const data = {
      alex: ["<b>1. Profil:</b> Alex...", "<b>2. Trauma:</b>...", "Seite 3", "Seite 4", "Seite 5", "Seite 6", "Seite 7", "Seite 8", "Seite 9", "Seite 10", "Seite 11", "Seite 12"],
      ciro: ["<b>1. Profil:</b> Ciro...", "<b>2. Trauma:</b>...", "Seite 3", "Seite 4", "Seite 5", "Seite 6", "Seite 7", "Seite 8", "Seite 9", "Seite 10", "Seite 11", "Seite 12"],
      blue: Array(12).fill("Leere Seite (Blaues Archiv)"),
      purple: Array(12).fill("Leere Seite (Lila Archiv)"),
      pink: Array(12).fill("Leere Seite (Band III)"),
      orange: Array(12).fill("Leere Seite (Band IV)"),
      brown: Array(12).fill("Leere Seite (Band V)"),
      white: Array(12).fill("Leere Seite (Band VI)")
    };

    let currentSet = 1;
    let currentBookKey = '';
    let currentPage = 0;

    function toggleShelf() {
      const shelf = document.getElementById('bookshelf');
      const btn = document.getElementById('nextBtn');
      if(currentSet === 1) {
        shelf.style.transform = 'translateX(-50%)';
        btn.innerText = '❮';
        currentSet = 2;
      } else {
        shelf.style.transform = 'translateX(0)';
        btn.innerText = '❯';
        currentSet = 1;
      }
    }

    function openBook(key) {
      currentBookKey = key;
      currentPage = 0;
      document.getElementById('bookTitle').innerText = key.toUpperCase();
      renderPage();
      document.getElementById('modal').classList.add('active');
    }

    function renderPage() {
      document.getElementById('bookContent').innerHTML = data[currentBookKey][currentPage];
      document.getElementById('pageIndicator').innerText = `${currentPage + 1} / 12`;
    }

    function changePage(dir) {
      let next = currentPage + dir;
      if(next >= 0 && next < 12) {
        currentPage = next;
        renderPage();
      }
    }

    function closeBook() { document.getElementById('modal').classList.remove('active'); }
  </script>
</body>
</html>
